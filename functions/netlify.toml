[build]
  publish = "public"

[functions]
  directory = "functions"

# ─── API Redirects ────────────────────────────────────────
[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude-proxy"
  status = 200

[[redirects]]
  from = "/api/supabase"
  to = "/.netlify/functions/supabase-proxy"
  status = 200

[[redirects]]
  from = "/api/download"
  to = "/.netlify/functions/supabase-proxy"
  status = 200

[[redirects]]
  from = "/api/google-auth"
  to = "/.netlify/functions/google-auth"
  status = 200

# ─── /app/* → SPA fallback ────────────────────────────────
# app/ klasörü içindeki bilinmeyen route'ları app/index.html'e yönlendir
[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

# ─── Kök fallback (landing page) ──────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Vergi Takvimi — her gün 09:00 TSI (06:00 UTC) ────────
[functions."tax-reminder"]
  schedule = "0 6 * * *"
